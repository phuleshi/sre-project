apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ghost
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"

spec:
  project: deploy

  source:
    repoURL: 'https://github.com/phuleshi/sre-project.git'
    targetRevision: main
    path: ghost
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true