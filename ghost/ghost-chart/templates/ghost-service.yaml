apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ghost
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-ghost
  annotations:
    {{- toYaml .Values.ghost.service.annotations | nindent 4 }}
spec:
  type: {{ .Values.ghost.service.type }}
  ports:
    - port: {{ .Values.ghost.service.port }}
      targetPort: 2368
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}-ghost
