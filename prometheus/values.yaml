prometheus:
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-type: external
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Tăng timeout để Prometheus có thời gian khởi động
    additionalArgs:
      - name: query.timeout
        value: 2m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2-csi
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 8Gi
    additionalScrapeConfigs:
      - job_name: ghost-mysql-metrics
        scrape_interval: 30s
        static_configs:
          - targets:
              - ghost-mysql-metrics.app.svc.cluster.local:9104

  # Tăng probe timeout
  livenessProbe:
    initialDelaySeconds: 60      # chờ 60s trước khi check
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10         # cho phép fail 10 lần