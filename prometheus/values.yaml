# ============================================================
# kube-prometheus-stack values
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
# ============================================================

# -- Namespace override
namespaceOverride: ""

# ============================================================
# Prometheus
# ============================================================
prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    retentionSize: "10GB"

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
          # storageClassName: standard   # uncomment & set your StorageClass

    # Scrape configs bổ sung (nếu cần)
    additionalScrapeConfigs: []

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
      # Bật HTTPS (uncomment nếu có ACM certificate):
      # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/CERT-ID
      # alb.ingress.kubernetes.io/ssl-redirect: "443"
    hosts:
      - prometheus.example.com   # ← đổi thành domain của bạn
    paths:
      - /
    pathType: Prefix

# ============================================================
# Alertmanager
# ============================================================
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
          # storageClassName: standard

  service:
    type: ClusterIP

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
    receivers:
      - name: "null"
    # Thêm receiver (Slack, email, PagerDuty…) tại đây

# ============================================================
# Grafana
# ============================================================
grafana:
  enabled: true
  adminPassword: "admin"   # ← đổi hoặc dùng Secret bên dưới

  # Dùng Secret thay vì plaintext (khuyến nghị):
  # admin:
  #   existingSecret: grafana-admin-secret
  #   userKey: admin-user
  #   passwordKey: admin-password

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 5Gi
    # storageClassName: standard

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
      # Bật HTTPS (uncomment nếu có ACM certificate):
      # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/CERT-ID
      # alb.ingress.kubernetes.io/ssl-redirect: "443"
    hosts:
      - grafana.example.com   # ← đổi thành domain của bạn
    path: /
    pathType: Prefix

  grafana.ini:
    server:
      root_url: "http://grafana.example.com/"   # ← đổi thành domain của bạn
    auth.anonymous:
      enabled: false

# ============================================================
# Node Exporter
# ============================================================
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 30Mi
    limits:
      cpu: 200m
      memory: 100Mi

# ============================================================
# Kube State Metrics
# ============================================================
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ============================================================
# Prometheus Operator
# ============================================================
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ============================================================
# Default rules / alerts
# ============================================================
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true